/* ───────── Shop Detail Card ───────── */
function ShopCard({ shop, isExpanded, onToggle }) {
  const totalFees = Object.values(shop.fees).reduce((a, b) => a + b, 0);
  const totalDeductions = totalFees + (shop.returns || 0);
  const pctDed = Math.abs(totalDeductions) / shop.sales * 100;
  const pctRec = (shop.totalReceived / shop.sales) * 100;
  const colorPct = pctDed > 30 ? "#f87171" : pctDed > 25 ? "#fbbf24" : "#34d399";

  return (
    <div className="card-hover fade-in" style={{
      background: "rgba(255,255,255,0.025)", border: "1px solid rgba(255,255,255,0.07)",
      borderRadius: 14, overflow: "hidden", transition: "all 0.3s ease", marginBottom: 10,
    }}>
      <div onClick={onToggle} style={{
        padding: "16px 22px", cursor: "pointer", display: "flex", alignItems: "center",
        justifyContent: "space-between", gap: 12, flexWrap: "wrap",
      }}>
        <div style={{ flex: "1 1 180px", minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
            <span style={{ fontSize: 16, fontWeight: 700, color: "#f0f0f0" }}>{shop.name}</span>
            <span style={{ fontSize: 10, color: "#888", background: "rgba(255,255,255,0.06)", padding: "2px 8px", borderRadius: 4 }}>{shop.period}</span>
          </div>
          {shop.salesPerson && <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>ฝ่ายขาย: {shop.salesPerson}</div>}
        </div>
        <div style={{ textAlign: "right", minWidth: 120 }}>
          <div style={{ fontSize: 10, color: "#888" }}>ยอดขาย</div>
          <div style={{ fontSize: 16, fontWeight: 700, color: "#34d399", fontFamily: "'JetBrains Mono'" }}>฿{fmt(shop.sales)}</div>
        </div>
        <div style={{ textAlign: "right", minWidth: 110 }}>
          <div style={{ fontSize: 10, color: "#888" }}>ได้รับจริง</div>
          <div style={{ fontSize: 16, fontWeight: 700, color: "#60a5fa", fontFamily: "'JetBrains Mono'" }}>฿{fmt(shop.totalReceived)}</div>
        </div>
        <div style={{ textAlign: "right", minWidth: 65 }}>
          <div style={{ fontSize: 10, color: "#888" }}>หัก %</div>
          <div style={{ fontSize: 16, fontWeight: 700, color: colorPct, fontFamily: "'JetBrains Mono'" }}>{fmtPct(pctDed)}</div>
        </div>
        <div style={{ fontSize: 16, color: "#555", transform: isExpanded ? "rotate(180deg)" : "", transition: "transform 0.3s" }}>▼</div>
      </div>

      {isExpanded && (
        <div className="slide-down" style={{ padding: "0 22px 20px", borderTop: "1px solid rgba(255,255,255,0.05)" }}>
          <div style={{ paddingTop: 14 }}>
            <div style={{ fontSize: 11, color: "#666", marginBottom: 6 }}>รหัสร้านค้า: {shop.storeId}</div>

            {shop.returns !== 0 && (
              <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid rgba(255,255,255,0.03)", color: "#f87171", fontSize: 13 }}>
                <span>หักเงินค่าสินค้า (คืนสินค้า)</span>
                <span style={{ fontFamily: "'JetBrains Mono'" }}>฿{fmt(shop.returns)} ({fmtPct(Math.abs(shop.returns) / shop.sales * 100)})</span>
              </div>
            )}

            {Object.entries(FEE_GROUPS).map(([gn, fks]) => {
              const items = fks.filter(k => shop.fees[k] !== undefined);
              if (!items.length) return null;
              const gt = items.reduce((a, k) => a + shop.fees[k], 0);
              return (
                <div key={gn} style={{ marginTop: 10 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: "#a78bfa", marginBottom: 4 }}>{gn}</div>
                  {items.map(k => (
                    <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0 4px 14px", fontSize: 12, borderBottom: "1px solid rgba(255,255,255,0.02)" }}>
                      <span style={{ color: "#bbb" }}>{k}</span>
                      <span style={{ fontFamily: "'JetBrains Mono'", color: shop.fees[k] >= 0 ? "#34d399" : "#f87171" }}>
                        ฿{fmt(shop.fees[k])} ({fmtPct(Math.abs(shop.fees[k]) / shop.sales * 100)})
                      </span>
                    </div>
                  ))}
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "5px 0 5px 14px", fontSize: 12, fontWeight: 600, color: gt >= 0 ? "#34d399" : "#fbbf24" }}>
                    <span>รวม {gn}</span>
                    <span style={{ fontFamily: "'JetBrains Mono'" }}>฿{fmt(gt)} ({fmtPct(Math.abs(gt) / shop.sales * 100)})</span>
                  </div>
                </div>
              );
            })}

            <div style={{ marginTop: 14, padding: "10px 14px", background: "rgba(99,102,241,0.1)", borderRadius: 10, display: "flex", justifyContent: "space-between", fontWeight: 700, fontSize: 14 }}>
              <span style={{ color: "#c4b5fd" }}>รวมค่าใช้จ่ายทั้งหมด</span>
              <span style={{ color: "#f87171", fontFamily: "'JetBrains Mono'" }}>฿{fmt(Math.abs(totalDeductions))} ({fmtPct(pctDed)})</span>
            </div>
            <div style={{ marginTop: 6, padding: "10px 14px", background: "rgba(52,211,153,0.1)", borderRadius: 10, display: "flex", justifyContent: "space-between", fontWeight: 700, fontSize: 14 }}>
              <span style={{ color: "#6ee7b7" }}>เงินที่ได้รับจริง</span>
              <span style={{ color: "#34d399", fontFamily: "'JetBrains Mono'" }}>฿{fmt(shop.totalReceived)} ({fmtPct(pctRec)})</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ───────── Add Shop Form ───────── */
function AddShopForm({ onAdd, onCancel }) {
  const [f, setF] = useState({ name: "", storeId: "", period: "", salesPerson: "", sales: "", returns: "" });
  const [enabledFees, setEnabledFees] = useState({});
  const [feeVals, setFeeVals] = useState({});
  const up = (k, v) => setF(p => ({ ...p, [k]: v }));

  const allFees = Object.values(FEE_GROUPS).flat();

  const handleSubmit = () => {
    if (!f.name || !f.sales) return;
    const fees = {};
    Object.keys(enabledFees).forEach(k => { if (enabledFees[k] && feeVals[k]) fees[k] = parseFloat(feeVals[k]) || 0; });
    const sn = parseFloat(f.sales) || 0;
    const rn = parseFloat(f.returns) || 0;
    const tf = Object.values(fees).reduce((a, b) => a + b, 0);
    onAdd({ id: Date.now(), name: f.name, storeId: f.storeId, period: f.period, salesPerson: f.salesPerson, sales: sn, returns: rn, fees, totalReceived: sn + rn + tf });
  };

  const is = { width: "100%", padding: "9px 12px", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, color: "#f0f0f0", fontSize: 13, outline: "none", fontFamily: "'Noto Sans Thai'" };

  return (
    <div className="fade-in" style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(124,58,237,0.25)", borderRadius: 14, padding: 24, marginBottom: 20 }}>
      <h3 style={{ fontSize: 18, fontWeight: 700, color: "#c4b5fd", marginBottom: 20 }}>➕ เพิ่มข้อมูลร้านใหม่</h3>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 14, marginBottom: 18 }}>
        {[["ชื่อร้าน *","name","ชื่อร้านค้า"],["รหัสร้านค้า","storeId","TH1XXXXX"],["งวด (เดือน/ปี)","period","01/2026"],["ชื่อฝ่ายขาย","salesPerson","ชื่อพนักงาน"]].map(([l,k,ph]) => (
          <div key={k}><label style={{ fontSize: 11, color: "#888", display: "block", marginBottom: 3 }}>{l}</label><input style={is} value={f[k]} onChange={e => up(k, e.target.value)} placeholder={ph} /></div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 20 }}>
        <div><label style={{ fontSize: 11, color: "#888", display: "block", marginBottom: 3 }}>ยอดรวมค่าสินค้า *</label><input style={is} type="number" value={f.sales} onChange={e => up("sales", e.target.value)} placeholder="0.00" /></div>
        <div><label style={{ fontSize: 11, color: "#888", display: "block", marginBottom: 3 }}>คืนสินค้า (ใส่เป็นลบ)</label><input style={is} type="number" value={f.returns} onChange={e => up("returns", e.target.value)} placeholder="-0.00" /></div>
      </div>

      <h4 style={{ fontSize: 14, fontWeight: 600, color: "#a78bfa", marginBottom: 10 }}>ค่าใช้จ่าย — ติ๊กเลือกรายการที่ต้องการ</h4>
      {Object.entries(FEE_GROUPS).map(([gn, fees]) => (
        <div key={gn} style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: "#fbbf24", marginBottom: 6 }}>{gn}</div>
          {fees.map(fee => (
            <div key={fee} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5, paddingLeft: 6, flexWrap: "wrap" }}>
              <input type="checkbox" checked={!!enabledFees[fee]} onChange={() => setEnabledFees(p => ({ ...p, [fee]: !p[fee] }))} style={{ width: 16, height: 16, accentColor: "#7c3aed", cursor: "pointer" }} />
              <span style={{ fontSize: 12, color: "#bbb", minWidth: 200, flex: "1 1 200px" }}>{fee}</span>
              {enabledFees[fee] && <input type="number" style={{ ...is, width: 160, padding: "5px 10px", flex: "0 0 160px" }} value={feeVals[fee] || ""} onChange={e => setFeeVals(p => ({ ...p, [fee]: e.target.value }))} placeholder="จำนวนเงิน" />}
              {enabledFees[fee] && f.sales && feeVals[fee] && (
                <span style={{ fontSize: 11, color: "#60a5fa", fontFamily: "'JetBrains Mono'", minWidth: 60 }}>= {fmtPct(Math.abs(parseFloat(feeVals[fee]) || 0) / (parseFloat(f.sales) || 1) * 100)}</span>
              )}
            </div>
          ))}
        </div>
      ))}

      <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
        <button onClick={handleSubmit} disabled={!f.name || !f.sales} style={{
          padding: "10px 28px", background: f.name && f.sales ? "linear-gradient(135deg, #7c3aed, #6d28d9)" : "#333",
          color: "#fff", border: "none", borderRadius: 8, fontSize: 14, fontWeight: 600, cursor: f.name && f.sales ? "pointer" : "not-allowed",
        }}>บันทึกข้อมูล</button>
        <button onClick={onCancel} style={{ padding: "10px 28px", background: "rgba(255,255,255,0.06)", color: "#999", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, fontSize: 14, cursor: "pointer" }}>ยกเลิก</button>
      </div>
    </div>
  );
}

    if (sortBy === "sales") return b.sales - a.sales;
    if (sortBy === "received") return b.totalReceived - a.totalReceived;
    if (sortBy === "pct") return ((b.sales - b.totalReceived) / b.sales) - ((a.sales - a.totalReceived) / a.sales);
    return b.sales - a.sales;
  }), [shops, sortBy]);

  const totals = useMemo(() => {
    const ts = shops.reduce((a, s) => a + s.sales, 0);

  const barData = useMemo(() => sorted.map(s => ({

                  const tp = (s.sales - s.totalReceived) / s.sales * 100;
                  return (
                    <tr key={s.id} style={{ borderBottom: "1px solid rgba(255,255,255,0.03)", background: i % 2 ? "rgba(255,255,255,0.012)" : "transparent" }}>
                      <td style={{ padding: "7px 8px", fontWeight: 600, color: "#ddd", position: "sticky", left: 0, background: i % 2 ? "#0d0d18" : "#0c0c14", zIndex: 1 }}>{s.name}</td>
                      {gps.map((p, j) => <td key={j} style={{ padding: "7px 8px", textAlign: "right", fontFamily: "'JetBrains Mono'", color: p > 15 ? "#f87171" : p > 10 ? "#fbbf24" : "#34d399" }}>{fmtPct(p)}</td>)}
                      <td style={{ padding: "7px 8px", textAlign: "right", fontFamily: "'JetBrains Mono'", color: rp > 0 ? "#f87171" : "#555" }}>{fmtPct(rp)}</td>
                      <td style={{ padding: "7px 8px", textAlign: "right", fontFamily: "'JetBrains Mono'", fontWeight: 700, color: tp > 30 ? "#f87171" : tp > 25 ? "#fbbf24" : "#34d399" }}>{fmtPct(tp)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Footer */}
      <div style={{ marginTop: 40, padding: "20px 0 40px", borderTop: "1px solid rgba(255,255,255,0.04)", textAlign: "center" }}>
        <span style={{ fontSize: 11, color: "#444" }}>Lazada Financial Dashboard V1 — พร้อมรองรับ Shopee ใน V2</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
